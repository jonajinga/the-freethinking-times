      - { name: chapterTitle, type: string, label: "Chapter title (display)" }
      - { name: chapterNumber, type: number }
      - { name: chapterSlug, type: string }
      - { name: workSlug, type: string }
      - { name: readingTimeMinutes, type: number }
      - { name: permalink, type: string }
      - { name: body, type: rich-text }

  # ── Data Files (JSON) ────────────────────────────────────
  - name: quotes
    label: Quotes
    path: src/_data/quotes.json
    type: file
    format: json
    list: true
    fields:
      - { name: quote, type: text, required: true }
      - { name: author, type: string, required: true }
      - { name: source, type: string }
      - { name: tags, type: string, list: true }
      - { name: era, type: select, options: ["Ancient", "Early Modern", "Enlightenment", "18th Century", "19th Century", "20th Century", "21st Century"] }

  - name: authors
    label: Authors
    path: src/_data/authors.json
    type: file
    format: json
    fields:
      - name: jon-ajinga
        type: object
        label: "Jon Ajinga"
        fields:
          - { name: name, type: string, required: true }
          - { name: slug, type: string, required: true }
          - { name: bio, type: text }
          - { name: role, type: string }
          - { name: avatar, type: image }
      - name: staff
        type: object
        label: "Staff"
        fields:
          - { name: name, type: string, required: true }
          - { name: slug, type: string, required: true }
          - { name: bio, type: text }
          - { name: role, type: string }
          - { name: avatar, type: image }

  - name: videos
    label: Videos
    path: src/_data/videos.json
    type: file
    format: json
    list: true
    fields:
      - { name: title, type: string, required: true }
      - { name: url, type: string, required: true, label: "YouTube URL" }
      - { name: embed, type: string, required: true, label: "Embed URL (youtube-nocookie)" }
      - { name: duration, type: string, label: "Duration (e.g. 58:00)" }
      - { name: speaker, type: string }
      - { name: date, type: string, label: "Year" }
      - { name: tags, type: string, list: true }
      - { name: description, type: text }

  - name: events
    label: Events
    path: src/_data/events.json
    type: file
    format: json
    list: true
    fields:
      - { name: name, type: string, required: true }
      - { name: date, type: date, required: true }
      - { name: updated, type: date, label: "Last updated (optional)" }
      - { name: assignedTo, type: string, label: "Assigned to (author slug, optional)" }
      - { name: dueDate, type: date, label: "Due date (optional)" }
      - { name: profile, type: select, options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, label: "Content profile" }
      - { name: audioUrl, type: string, label: "Audio URL (for podcast profile only)" }
      - { name: embedUrl, type: string, label: "Embed URL (for data visualization profile only)" }
      - { name: endDate, type: date, label: "End date" }
      - { name: location, type: string }
      - { name: region, type: select, options: [National, Northeast, Southeast, Midwest, Southwest, West, Pacific, International, Online] }
      - { name: type, type: select, options: [convention, conference, meetup, observance, workshop, lecture] }
      - { name: url, type: string }
      - { name: description, type: text }
      - { name: recurrence, type: select, options: ["", annual], label: "Recurrence" }
      - { name: recurrenceMonth, type: number, label: "Recurrence month (1-12)" }
      - { name: recurrenceWeek, type: number, label: "Recurrence week (1-5)" }
      - { name: recurrenceDay, type: number, label: "Recurrence day (0=Sun, 6=Sat)" }

  - name: timeline
    label: Timeline
    path: src/_data/timeline.json
    type: file
    format: json
    list: true
    fields:
      - { name: year, type: number, required: true, label: "Year (negative for BCE)" }
      - { name: title, type: string, required: true }
      - { name: description, type: text, required: true }
      - { name: era, type: select, options: [Ancient, "Early Modern", Enlightenment, "19th Century", "20th Century", "21st Century"], required: true }

  - name: feeds
    label: RSS Feeds
    path: src/_data/feeds.json
    type: file
    format: json
    list: true
    fields:
      - { name: name, type: string, required: true }
      - { name: url, type: string, required: true, label: "Feed URL" }
      - { name: category, type: select, options: [Organizations, Publications] }

  - name: changelog
    label: Changelog
    path: src/_data/changelog.json
    type: file
    format: json
    list: true
    fields:
      - { name: date, type: date, required: true }
      - { name: updated, type: date, label: "Last updated (optional)" }
      - { name: assignedTo, type: string, label: "Assigned to (author slug, optional)" }
      - { name: dueDate, type: date, label: "Due date (optional)" }
      - { name: profile, type: select, options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, label: "Content profile" }
      - { name: audioUrl, type: string, label: "Audio URL (for podcast profile only)" }
      - { name: embedUrl, type: string, label: "Embed URL (for data visualization profile only)" }
      - { name: title, type: string, required: true }
      - name: sections
        type: object
        list: true
        label: "Sections"
        fields:
          - { name: label, type: string, required: true }
          - { name: entries, type: string, list: true, label: "Changes" }

  - name: gallery
    label: Gallery
    path: src/_data/gallery.json
    type: file
    format: json
    list: true
    fields:
      - { name: src, type: string, required: true, label: "Image path (e.g. /assets/img/gallery/...)" }
      - { name: alt, type: string, required: true, label: "Alt text" }
      - { name: credit, type: string, label: "Photographer / credit" }
      - { name: license, type: select, options: ["Public Domain", "CC0", "CC BY", "CC BY-SA", "CC BY-NC", "All Rights Reserved"] }
      - { name: category, type: string }

  - name: playlists
    label: Music Playlists
    path: src/_data/playlists.json
    type: file
    format: json
    list: true
    fields:
      - { name: name, type: string, required: true }
      - { name: description, type: text }
      - { name: playlistId, type: string, required: true, label: "YouTube Playlist ID" }
      - { name: category, type: select, options: [Mixed, Focus, Ambient, Classical, Jazz, Electronic] }

  - name: songs
    label: Songs
    path: src/_data/songs.json
    type: file
    format: json
    list: true
    fields:
      - { name: title, type: string, required: true }
      - { name: artist, type: string, required: true }
      - { name: album, type: string }
      - { name: year, type: number }
      - { name: genre, type: string }
      - { name: tags, type: string, list: true }
      - { name: url, type: string, label: "YouTube URL" }

  - name: profiles
    label: Content Profiles
    path: src/_data/profiles.json
    type: file
    format: json

  - name: site-config
    label: Site Configuration
    path: src/_data/site.json
    type: file
    format: json

  # ── Static Pages (.njk) ─────────────────────────────────
  - name: pages
    label: Pages
    path: src/pages
    type: collection
    format: yaml-frontmatter
    extension: njk
    fields:
      - { name: layout, type: string, default: base, hidden: true }
      - { name: title, type: string, required: true }
      - { name: description, type: text }
      - { name: permalink, type: string }
      - { name: body, type: code }
