  # ── Projects (Markdown collections) ──────────────────────
  - name: glossary
    label: Glossary
    path: src/glossary
    type: collection
    filename: "{fields.title|slugify}.md"
    fields:
      - { name: layout, type: string, default: "layouts/glossary-entry", hidden: true }
      - { name: title, type: string, required: true, label: "Term" }
      - { name: description, type: text, required: true, label: "Short definition" }
      - { name: etymology, type: text, label: "Etymology" }
      - name: keyFigures
        type: string
        list: true
        label: "Key figures"
      - name: relatedTerms
        type: object
        list: true
        label: "Related terms"
        fields:
          - { name: title, type: string, required: true }
          - { name: url, type: string, required: true }
      - { name: tags, type: string, list: true }
      - { name: date, type: date }
      - { name: body, type: rich-text, label: "Full definition" }

  - name: bookshelf
    label: Recommended Reading
    path: src/bookshelf
    type: collection
    filename: "{fields.title|slugify}.md"
    fields:
      - { name: layout, type: string, default: book-entry, hidden: true }
      - { name: title, type: string, required: true, label: "Book title" }
      - { name: bookAuthor, type: string, required: true, label: "Author" }
      - { name: year, type: number, label: "Year published" }
      - { name: publisher, type: string }
      - { name: category, type: string, label: "Category" }
      - { name: difficulty, type: select, options: [Accessible, Intermediate, Advanced] }
      - { name: description, type: text, required: true, label: "Short description" }
      - { name: bestFor, type: text, label: "Best for (audience)" }
      - { name: tags, type: string, list: true }
      - { name: date, type: date }
      - { name: body, type: rich-text, label: "Full review / notes" }

  - name: thought-experiments
    label: Thought Experiments
    path: src/thought-experiments
    type: collection
    filename: "{fields.title|slugify}.md"
    fields:
      - { name: layout, type: string, default: article, hidden: true }
      - { name: title, type: string, required: true }
      - { name: description, type: text, required: true }
      - { name: section, type: string, default: "Thought Experiments", hidden: true }
      - { name: author, type: string, default: staff }
      - { name: date, type: date, required: true }
      - { name: updated, type: date, label: "Last updated (optional)" }
      - { name: assignedTo, type: string, label: "Assigned to (author slug, optional)" }
      - { name: dueDate, type: date, label: "Due date (optional)" }
      - { name: profile, type: select, options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, label: "Content profile" }
      - { name: audioUrl, type: string, label: "Audio URL (for podcast profile only)" }
      - { name: embedUrl, type: string, label: "Embed URL (for data visualization profile only)" }
      - { name: philosopher, type: string, label: "Philosopher / originator" }
      - { name: yearProposed, type: string, label: "Year proposed" }
      - { name: field, type: string, label: "Field (e.g. Epistemology, Ethics)" }
      - { name: tags, type: string, list: true }
      - { name: body, type: rich-text }

  - name: trials
    label: Trials of Thought
    path: src/trials
    type: collection
    filename: "{fields.title|slugify}.md"
    fields:
      - { name: layout, type: string, default: article, hidden: true }
      - { name: title, type: string, required: true }
      - { name: description, type: text, required: true }
      - { name: section, type: string, default: "Trials of Thought", hidden: true }
      - { name: author, type: string, default: staff }
      - { name: date, type: date, required: true }
      - { name: updated, type: date, label: "Last updated (optional)" }
      - { name: assignedTo, type: string, label: "Assigned to (author slug, optional)" }
      - { name: dueDate, type: date, label: "Due date (optional)" }
      - { name: profile, type: select, options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, label: "Content profile" }
      - { name: audioUrl, type: string, label: "Audio URL (for podcast profile only)" }
      - { name: embedUrl, type: string, label: "Embed URL (for data visualization profile only)" }
      - { name: year, type: number, label: "Year of trial" }
      - { name: yearLabel, type: string, label: "Year label (display)" }
      - { name: jurisdiction, type: string }
      - { name: defendant, type: string }
      - { name: charge, type: text }
      - { name: verdict, type: string }
      - { name: outcome, type: text }
      - { name: tags, type: string, list: true }
      - { name: body, type: rich-text }

  # ── Library ──────────────────────────────────────────────
  - name: library-chapters
    label: Library Chapters
    path: src/library/works
    type: collection
    fields:
      - { name: layout, type: string, hidden: true }
