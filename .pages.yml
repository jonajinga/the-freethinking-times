# Pages CMS Configuration
# https://pagescms.org/docs/configuration/
#
# This file defines all content collections editable via Pages CMS. Each
# collection maps to a folder under src/content/ (articles) or a top-level
# project folder (glossary, bookshelf, thought-experiments, trials, library).
#
# For forks: the default `author` value below (`jon-ajinga`) must match an
# entry in src/_data/authors.json — change it to your own author slug when
# you set up your fork, or remove the default and make the field required.

media:
  input: src/assets/img
  output: /assets/img

content:
  # ── Articles ──────────────────────────────────────────────
  - name: news
    label: News
    path: src/content/news
    type: collection
    filename: "{fields.title|slugify}.md"
    fields:
      - { name: layout, type: string, default: article, hidden: true }
      - { name: title, type: string, required: true }
      - { name: description, type: text, required: true }
      - { name: section, type: string, default: News, hidden: true }
      - { name: author, type: string, default: jon-ajinga }  # forks: change to your own authors.json slug
      - { name: authorName, type: string, default: "Jon Ajinga" }
      - { name: date, type: date, required: true }
      - { name: updated, type: date, label: "Last updated (optional)" }
      - { name: assignedTo, type: string, label: "Assigned to (author slug, optional)" }
      - { name: dueDate, type: date, label: "Due date (optional)" }
      - { name: profile, type: select, options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, label: "Content profile" }
      - { name: audioUrl, type: string, label: "Audio URL (for podcast profile only)" }
      - { name: embedUrl, type: string, label: "Embed URL (for data visualization profile only)" }
      - { name: tags, type: string, list: true }
      - { name: featured, type: boolean, default: false }
      - { name: emailOnly, type: boolean, default: false, label: "Email-only (sends to newsletter, no web page)" }
      - { name: draft, type: boolean, default: true }
      - { name: status, type: select, options: [draft, review, published], default: draft }
      - { name: image, type: image }
      - { name: imageAlt, type: string }
      - name: attachments
        type: object
        list: true
        label: "File attachments"
        fields:
          - { name: name, type: string, required: true, label: "File name" }
          - { name: path, type: string, required: true, label: "File path or URL" }
          - { name: description, type: string, label: "Description" }
      - { name: body, type: rich-text }

  - name: opinion
