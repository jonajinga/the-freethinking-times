          - { name: description, type: text, required: true }
      - { name: body, type: rich-text }

  - name: trials
    label: Trials of Thought
    path: src/trials
    type: collection
    filename: "{fields.title|slugify}.md"
    fields:
      - { name: layout, type: string, default: article, hidden: true }
      - { name: title, type: string, required: true }
      - { name: description, type: text, required: true }
      - { name: section, type: string, default: "Trials of Thought", hidden: true }
      - { name: author, type: string, default: staff }
      - { name: date, type: date, required: true }
      - { name: updated, type: date, label: "Last updated (optional)" }
      - { name: year, type: number, label: "Year of trial" }
      - { name: yearLabel, type: string, label: "Year label (display, e.g. '1895' or 'c. 399 BCE')" }
      - { name: jurisdiction, type: string }
      - { name: defendant, type: string }
      - { name: charge, type: text }
      - { name: verdict, type: string }
      - { name: outcome, type: text }
      - { name: profile, type: select, options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, label: "Content profile" }
      - { name: audioUrl, type: string, label: "Audio URL (podcast profile only)" }
      - { name: embedUrl, type: string, label: "Embed URL (data visualization profile only)" }
      - { name: image, type: image }
      - { name: imageAlt, type: string }
      - { name: tags, type: string, list: true }
      - { name: draft, type: boolean, default: true }
      - { name: status, type: select, options: [draft, review, published], default: draft }
      - { name: assignedTo, type: string, label: "Assigned to (author slug)" }
      - { name: dueDate, type: date, label: "Due date" }
      - name: corrections
        type: object
        list: true
        label: "Corrections"
        fields:
          - { name: date, type: date, required: true }
          - { name: description, type: text, required: true }
      - { name: body, type: rich-text }

  # ── Library ─────────────────────────────────────────────────────────────────

  - name: library-chapters
    label: Library Chapters
    path: src/library/works
    type: collection
    fields:
      - { name: layout, type: string, hidden: true }
      - { name: title, type: string, required: true }
      - { name: chapterTitle, type: string, label: "Chapter title (display)" }
      - { name: chapterNumber, type: number }
      - { name: chapterSlug, type: string }
      - { name: workSlug, type: string, label: "Parent work slug (e.g. age-of-reason)" }
      - { name: readingTimeMinutes, type: number }
      - { name: permalink, type: string }
      - { name: body, type: rich-text }

  # ── Data Files (JSON) ────────────────────────────────────────────────────────

  - name: authors
    label: Authors
    path: src/_data/authors.json
    type: file
    format: json
    list: true
    fields:
      - { name: slug, type: string, required: true, label: "Slug (e.g. jane-doe — used in article front matter and author URL)" }
      - { name: name, type: string, required: true, label: "Display name" }
      - { name: role, type: string, label: "Role (e.g. Founding Editor, Staff Reporter)" }
      - { name: title, type: string, label: "Professional title" }
      - { name: location, type: string, label: "Location (e.g. Denver, Colorado)" }
      - { name: bio, type: text, label: "Short bio (shown in byline tooltips)" }
      - { name: bioLong, type: rich-text, label: "Full bio (shown on author page)" }
      - { name: photo, type: image, label: "Author photo" }
      - name: social
        type: object
        label: "Social media links"
        fields:
          - { name: x, type: string, label: "X / Twitter URL" }
          - { name: bluesky, type: string, label: "Bluesky URL" }
          - { name: mastodon, type: string, label: "Mastodon URL" }
          - { name: linkedin, type: string, label: "LinkedIn URL" }
          - { name: github, type: string, label: "GitHub URL" }
          - { name: threads, type: string, label: "Threads URL" }
          - { name: instagram, type: string, label: "Instagram URL" }
          - { name: website, type: string, label: "Personal website URL" }
          - { name: email, type: string, label: "Public email address" }
      - name: tipping
        type: object
        label: "Support / donation links"
        fields:
          - { name: kofi, type: string, label: "Ko-fi URL" }
          - { name: bmac, type: string, label: "Buy Me A Coffee URL" }
          - { name: patreon, type: string, label: "Patreon URL" }

  - name: quotes
    label: Quotes
    path: src/_data/quotes.json
    type: file
    format: json
    list: true
    fields:
      - { name: author, type: string, required: true }
      - { name: quote, type: text, required: true }
      - { name: source, type: string }
      - { name: tags, type: string, list: true }
      - { name: era, type: select, options: ["Ancient", "Early Modern", "Enlightenment", "18th Century", "19th Century", "20th Century", "21st Century"] }

  - name: timeline
    label: Timeline
    path: src/_data/timeline.json
    type: file
    format: json
    list: true
    fields:
      - { name: title, type: string, required: true }
      - { name: year, type: number, required: true, label: "Year (use negative for BCE, e.g. -399)" }
      - { name: description, type: text, required: true }
      - { name: era, type: select, options: [Ancient, "Early Modern", Enlightenment, "19th Century", "20th Century", "21st Century"], required: true }

  - name: events
    label: Events
    path: src/_data/events.json
    type: file
    format: json
    list: true
    fields:
      - { name: name, type: string, required: true }
      - { name: date, type: date, required: true }
      - { name: endDate, type: date, label: "End date (optional)" }
      - { name: location, type: string }
      - { name: region, type: select, options: [National, Northeast, Southeast, Midwest, Southwest, West, Pacific, International, Online] }
      - { name: type, type: select, options: [convention, conference, meetup, observance, workshop, lecture] }
      - { name: url, type: string, label: "Event website URL" }
      - { name: description, type: text }
      - { name: recurrence, type: select, options: ["", annual], label: "Recurrence" }
      - { name: recurrenceMonth, type: number, label: "Recurrence month (1–12)" }
      - { name: recurrenceWeek, type: number, label: "Recurrence week (1–5, 0 = any)" }
      - { name: recurrenceDay, type: number, label: "Recurrence day (0=Sun … 6=Sat)" }

  - name: videos
    label: Videos
    path: src/_data/videos.json
    type: file
    format: json
    list: true
    fields:
      - { name: title, type: string, required: true }
      - { name: url, type: string, required: true, label: "YouTube URL" }
      - { name: embed, type: string, required: true, label: "Embed URL (use youtube-nocookie.com)" }
      - { name: duration, type: string, label: "Duration (e.g. 58:00)" }
      - { name: speaker, type: string }
      - { name: date, type: string, label: "Year" }
      - { name: tags, type: string, list: true }
      - { name: description, type: text }

  - name: feeds
    label: RSS Feeds
    path: src/_data/feeds.json
    type: file
    format: json
    list: true
    fields:
      - { name: name, type: string, required: true }
      - { name: url, type: string, required: true, label: "Feed URL" }
      - { name: category, type: select, options: [Organizations, Publications] }

  - name: gallery
    label: Gallery
    path: src/_data/gallery.json
    type: file
    format: json
    list: true
    fields:
      - { name: src, type: string, required: true, label: "Image path (e.g. /assets/img/gallery/photo.jpg)" }
      - { name: alt, type: string, required: true, label: "Alt text (required for accessibility)" }
      - { name: credit, type: string, label: "Photographer / credit" }
      - { name: license, type: select, options: ["Public Domain", "CC0", "CC BY", "CC BY-SA", "CC BY-NC", "All Rights Reserved"] }
      - { name: category, type: string }

  - name: playlists
    label: Music Playlists
    path: src/_data/playlists.json
    type: file
    format: json
    list: true
    fields:
      - { name: name, type: string, required: true }
      - { name: description, type: text }
      - { name: playlistId, type: string, required: true, label: "YouTube Playlist ID (the part after list= in the URL)" }
      - { name: category, type: select, options: [Mixed, Focus, Ambient, Classical, Jazz, Electronic] }

  - name: songs
    label: Songs
    path: src/_data/songs.json
    type: file
    format: json
    list: true
    fields:
      - { name: title, type: string, required: true }
      - { name: artist, type: string, required: true }
      - { name: album, type: string }
      - { name: year, type: number }
      - { name: genre, type: string }
      - { name: tags, type: string, list: true }
      - { name: url, type: string, label: "YouTube URL" }

  - name: games
    label: Games
    path: src/_data/games.json
    type: file
    format: json
    list: true
    fields:
      - { name: slug, type: string, required: true, label: "URL slug (e.g. fifteen-puzzle)" }
      - { name: title, type: string, required: true }
      - { name: description, type: text, required: true }
      - { name: icon, type: string, label: "Emoji icon" }
      - { name: url, type: string, required: true, label: "Game URL or path" }

  - name: changelog
    label: Changelog
    path: src/_data/changelog.json
    type: file
    format: json
    list: true
    fields:
      - { name: title, type: string, required: true }
      - { name: date, type: date, required: true }
      - name: sections
        type: object
        list: true
        label: "Sections"
        fields:
          - { name: label, type: string, required: true, label: "Section label (e.g. Added, Fixed, Changed)" }
          - { name: entries, type: string, list: true, label: "Changes" }

  - name: site-settings
    label: Site Settings
    path: src/_data/site-settings.json
    type: file
    format: json
    fields:
      - { name: title, type: string, required: true, label: "Publication name" }
      - { name: description, type: text, required: true, label: "Site description (shown in SEO and social previews)" }
      - { name: tagline, type: text, label: "Footer tagline (shown below publication name in the footer)" }
      - { name: author, type: string, required: true, label: "Publication byline (used in RSS, JSON-LD, etc.)" }
      - { name: email, type: string, label: "Contact email address" }
      - { name: founded, type: number, label: "Year founded" }
      - { name: footerByline, type: string, label: "Footer byline (replaces auto-generated 'Founded X. Tagline' text)" }
      - { name: gtranslate, type: boolean, label: "Enable Google Translate widget" }
      - name: tipping
        type: object
        label: "Reader support links (Ko-fi, BMAC, or Patreon — first non-empty wins)"
        fields:
          - { name: kofi, type: string, label: "Ko-fi URL" }
          - { name: bmac, type: string, label: "Buy Me A Coffee URL" }
          - { name: patreon, type: string, label: "Patreon URL" }
      - name: newsletter
        type: object
        label: "Newsletter (Buttondown)"
        fields:
          - { name: provider, type: string, label: "Provider (buttondown)" }
          - { name: username, type: string, label: "Buttondown username" }
      - name: social
        type: object
        label: "Social media links"
        fields:
          - { name: twitter, type: string, label: "Twitter / X URL" }
          - { name: mastodon, type: string, label: "Mastodon URL" }
          - { name: rss, type: string, label: "RSS feed path (default: /feed.xml)" }
      - name: subscribe
        type: object
        label: "Newsletter subscribe block copy"
        fields:
          - { name: eyebrow,       type: string, label: "Eyebrow line (inline block)" }
          - { name: heading,       type: string, label: "Heading (inline block)" }
          - { name: body,          type: text,   label: "Body copy (inline block)" }
          - { name: notice,        type: string, label: "Notice line below form (inline block)" }
          - { name: sidebarBody,   type: string, label: "Sidebar widget body copy" }
          - { name: footerHeading, type: string, label: "Footer block heading" }
          - { name: footerBody,    type: string, label: "Footer block body copy" }
      - { name: contactSubjects, type: string, list: true, label: "Contact form subject dropdown options" }

  - name: nav
    label: Main Navigation
    path: src/_data/nav.json
    type: file
    format: json
    list: true
    fields:
      - { name: label, type: string, required: true, label: "Link label" }
      - { name: url, type: string, required: true, label: "URL" }
      - { name: key, type: string, required: true, label: "Unique key (slug, no spaces — used for dropdown IDs)" }
      - { name: collection, type: string, label: "Eleventy collection name (e.g. news, opinion) — enables section dropdown" }
      - { name: type, type: string, label: "Special type: 'more' (mega-menu) or 'library'" }

  - name: footerLinks
    label: Footer Navigation
    path: src/_data/footerLinks.json
    type: file
    format: json
    list: true
    fields:
      - { name: heading, type: string, required: true, label: "Column heading" }
      - { name: headingUrl, type: string, label: "Heading URL (optional — makes the heading a link)" }
      - name: links
        type: object
        list: true
        label: "Links"
        fields:
          - { name: label, type: string, required: true, label: "Link text" }
          - { name: url, type: string, required: true, label: "URL" }
          - { name: title, type: string, label: "Tooltip (title attribute)" }

  - name: megaMenu
    label: "More" Mega Menu
    path: src/_data/megaMenu.json
    type: file
    format: json
    list: true
    fields:
      - { name: heading, type: string, required: true, label: "Column heading" }
      - name: links
        type: object
        list: true
        label: "Links"
        fields:
          - { name: title, type: string, required: true, label: "Link title" }
          - { name: url, type: string, required: true, label: "URL" }
          - { name: desc, type: string, required: true, label: "Short description (shown below title)" }

  - name: drawerLinks
    label: Mobile Drawer Navigation
    path: src/_data/drawerLinks.json
    type: file
    format: json
    list: true
    fields:
      - { name: heading, type: string, label: "Section heading (leave blank for no heading)" }
      - { name: showSupportBadgeAfter, type: boolean, label: "Show support badge after this group" }
      - { name: small, type: boolean, label: "Use small link style" }
      - name: links
        type: object
        list: true
        label: "Links"
        fields:
          - { name: label, type: string, required: true, label: "Link text" }
          - { name: url, type: string, required: true, label: "URL" }

  - name: contributeContent
    label: Contribute Page Content
    path: src/_data/contributeContent.json
    type: file
    format: json
    fields:
      - name: tiers
        type: object
        list: true
        label: "Contributor tiers"
        fields:
          - { name: name, type: string, required: true, label: "Tier name" }
          - { name: desc, type: text, required: true, label: "Description" }
      - { name: lookingFor, type: string, list: true, label: "What we look for (list)" }
      - { name: topics, type: string, list: true, label: "Topics of particular interest (list)" }
      - name: otherWays
        type: object
        list: true
        label: "Other ways to contribute"
        fields:
          - { name: label, type: string, required: true, label: "Link text" }
          - { name: url, type: string, required: true, label: "URL" }
      - { name: writingStyle, type: string, list: true, label: "Writing style guidelines (list)" }

  - name: aboutContent
    label: About Page Content
    path: src/_data/aboutContent.json
    type: file
    format: json
    fields:
      - { name: whatWeAre,      type: text, list: true, label: "What We Are (paragraphs)" }
      - { name: whyWeExist,     type: text, list: true, label: "Why We Exist (paragraphs)" }
      - { name: whatWeStandFor, type: text, list: true, label: "What We Stand For (paragraphs)" }
      - { name: whatWeWillNotDo, type: text, list: true, label: "What We Will Not Do (paragraphs)" }

  - name: supportContent
    label: Support Page Content
    path: src/_data/supportContent.json
    type: file
    format: json
    fields:
      - { name: headerHeading,        type: string, required: true, label: "Page heading" }
      - { name: headerSubtitle,       type: text,   required: true, label: "Header subtitle (italic intro)" }
      - { name: howFunded,            type: text,   list: true,     label: "How We're Funded (paragraphs)" }
      - { name: whereSupportGoes,     type: text,   list: true,     label: "Where Your Support Goes (paragraphs)" }
      - { name: publicationBlockBody, type: text,   required: true, label: "Publication support block body" }
      - { name: authorBlockBody,      type: text,   required: true, label: "Author support block body" }
      - { name: nobudgetHeading,      type: string, required: true, label: "Subscribe-instead heading" }
      - { name: nobudgetBody,         type: text,   required: true, label: "Subscribe-instead body" }
      - { name: closingNote,          type: text,   required: true, label: "Footer closing note (italic)" }

  - name: profiles
    label: Content Profiles
    path: src/_data/profiles.json
    type: file
    format: json

  # ── Static Pages (.njk) ─────────────────────────────────────────────────────
  # Caution: editing Nunjucks templates requires knowledge of the template
  # language. The `body` field here is a raw code editor, not a rich-text field.

  - name: pages
    label: Pages
    path: src/pages
    type: collection
    format: yaml-frontmatter
    extension: njk
    fields:
      - { name: layout, type: string, default: base, hidden: true }
      - { name: title, type: string, required: true }
      - { name: description, type: text }
      - { name: permalink, type: string }
      - { name: body, type: text }
